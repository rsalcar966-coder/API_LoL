<header class="lol-header" id="main-header">
  <!-- Decorative top gold line -->
  <div class="header__top-accent" aria-hidden="true"></div>

  <div class="header__container">
    <!-- Logo -->
    <a routerLink="/inicio" class="header__logo" id="header-logo">
      <img src="LoL.ico" alt="LoL Hub" class="header__logo-icon" />
      <div class="header__logo-text">
        <span class="header__logo-title">LoL</span>
        <span class="header__logo-subtitle">HUB</span>
      </div>
    </a>

    <!-- Navigation -->
    <nav class="header__nav" id="header-nav" aria-label="Navegación principal">
      <ul class="header__nav-list">
        <li class="header__nav-item">
          <a routerLink="/inicio" class="header__nav-link" routerLinkActive="header__nav-link--active"
            id="nav-inicio">
            <span class="header__nav-icon"></span>
            Inicio
          </a>
        </li>
        <li class="header__nav-item">
          <a routerLink="/campeones" class="header__nav-link" routerLinkActive="header__nav-link--active"
            id="nav-campeones">
            <span class="header__nav-icon"></span>
            Campeones
          </a>
        </li>
        <li class="header__nav-item">
          <a routerLink="/estadisticas" class="header__nav-link" routerLinkActive="header__nav-link--active" id="nav-stats">
            <span class="header__nav-icon"></span>
            Estadísticas
          </a>
        </li>
        <li class="header__nav-item">
          <a routerLink="/builds" class="header__nav-link" routerLinkActive="header__nav-link--active" id="nav-builds">
            <span class="header__nav-icon"></span>
            Builds
          </a>
        </li>
        <li class="header__nav-item">
          <a routerLink="/contacto" class="header__nav-link" routerLinkActive="header__nav-link--active" id="nav-contacto">
            <span class="header__nav-icon"></span>
            Contáctanos
          </a>
        </li>
      </ul>
    </nav>

    <!-- Right side actions -->
    <div class="header__actions" id="header-actions">
      <button class="header__search-btn" id="header-search-btn" aria-label="Buscar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.35-4.35" />
        </svg>
      </button>

      <!-- Mobile menu toggle -->
      <button class="header__menu-toggle" id="header-menu-toggle" aria-label="Abrir menú" (click)="toggleMenu()">
        <span class="header__menu-bar"></span>
        <span class="header__menu-bar"></span>
        <span class="header__menu-bar"></span>
      </button>
    </div>
  </div>

  <!-- Mobile navigation overlay -->
  <div class="header__mobile-nav" [class.header__mobile-nav--open]="menuOpen" id="mobile-nav">
    <nav aria-label="Navegación móvil">
      <ul class="header__mobile-list">
        <li><a routerLink="/inicio" class="header__mobile-link" (click)="closeMenu()"> Inicio</a></li>
        <li><a routerLink="/campeones" class="header__mobile-link" (click)="closeMenu()"> Campeones</a></li>
        <li><a routerLink="/estadisticas" class="header__mobile-link" (click)="closeMenu()"> Estadísticas</a></li>
        <li><a routerLink="/builds" class="header__mobile-link" (click)="closeMenu()"> Builds</a></li>
        <li><a routerLink="/contacto" class="header__mobile-link" (click)="closeMenu()"> Contáctanos</a></li>
      </ul>
    </nav>
  </div>

  <!-- Decorative bottom gold border -->
  <div class="header__bottom-border" aria-hidden="true"></div>
</header>
